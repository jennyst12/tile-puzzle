<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Fifteen Puzzle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="puzzle.css">
</head>
<body>
  <canvas id="fwCanvas"></canvas>
  <div class="wrapper">
    <header>
      <h1>Fifteen</h1>
      <div class="subtitle">sliding puzzle</div>
    </header>

    <div class="pattern-row" id="patternRow"></div>

    <div class="stats">
      <div class="stat"><span class="stat-label">Moves</span><span class="stat-value" id="moves">0</span></div>
      <div class="stat"><span class="stat-label">Completed</span><span class="stat-value" id="completed">0</span></div>
      <div class="stat"><span class="stat-label">Best</span><span class="stat-value" id="best">—</span></div>
    </div>

    <div class="board-wrap">
      <div class="board" id="board"></div>
      <div class="win-overlay" id="winOverlay">
        <div class="win-title">Solved!</div>
        <div class="win-moves" id="winMoves"></div>
        <div class="win-sub">tap to play again</div>
      </div>
    </div>

    <div class="controls">
      <button class="primary" id="btnHint">Hint</button>
      <button id="btnUndo" disabled>Undo</button>
      <button id="btnRestart">Restart</button>
      <button id="btnNew">New Game</button>
      <button id="btnTheme">☀ Light</button>
    </div>

    <div class="img-row">
      <input type="text" id="imgUrl" placeholder="Paste image URL to use your own…">
      <button id="btnImg">Use</button>
    </div>
    <div class="msg" id="msg"></div>
  </div>

  <script src="puzzle.js"></script>
</body>
</html>
